<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="speeds.css" />
  </head>
  <body>
    <div class="container">
      <h3>SpeederAddon</h3>
      <div class="value-display" id="currentVal">1.0x</div>
      <input
        type="range"
        id="speedRange"
        min="0.1"
        max="5"
        step="0.1"
        value="1"
      />

      <div class="grid">
        <button data-speed="2">2x</button>
        <button data-speed="2.5">2.5x</button>
        <button data-speed="3">3x</button>
        <button data-speed="3.5">3.5x</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
